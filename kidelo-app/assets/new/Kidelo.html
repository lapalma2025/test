<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover" />
<title>Kidelo</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Newsreader:ital,opsz,wght@0,6..72,400;0,6..72,500;1,6..72,400&family=Geist:wght@400;500&family=Geist+Mono:wght@400;500&display=swap" rel="stylesheet" />
<style>
  :root{
    --cream:#FAF7F2; --white:#FFFFFF;
    --evergreen:#3D5147; --evergreen-deep:#33433A;
    --sage:#8C9F8E; --sand:#EFE9DC; --clay:#F5DDD0; --sage-soft:#DCE6DD;
    --terracotta:#BD6A4E;
    --ink:#2B2620; --ink-soft:#6E6457; --ink-faint:#AAA193;
    --line:#E5DFD3; --line-soft:#EDE8DE;
    --serif:'Newsreader', Georgia, serif;
    --sans:'Geist', system-ui, -apple-system, sans-serif;
    --mono:'Geist Mono', ui-monospace, monospace;
    --r:16px; --r-lg:22px; --r-frame:36px;
  }
  *{ box-sizing:border-box; }
  html,body{ margin:0; height:100%; }
  body{
    font-family:var(--sans); color:var(--ink); background:#E7E0D4;
    -webkit-font-smoothing:antialiased; text-rendering:optimizeLegibility;
    display:grid; place-items:center;
  }
  button{ font-family:inherit; }
  ::-webkit-scrollbar{ width:0; height:0; }

  .k-app{
    position:relative; width:min(100vw,430px); height:100vh;
    background:var(--cream); overflow:hidden;
    display:flex; flex-direction:column;
  }
  @media (min-width:472px) and (min-height:860px){
    .k-app{ height:900px; border-radius:var(--r-frame); outline:0.5px solid var(--line); }
  }
  .k-app__body{ flex:1; overflow-y:auto; overflow-x:hidden; -webkit-overflow-scrolling:touch; }
  .k-screen{ padding:0 18px 26px; }
  .k-detail,.k-ob,.k-auth{ padding:0; }

  /* ---------- typografia / atomy ---------- */
  .k-kicker{ font:500 12px/1 var(--sans); letter-spacing:.04em; color:var(--ink-faint); }
  .k-pagetitle{ font:500 27px/1.05 var(--serif); margin:0; letter-spacing:-.01em; }
  .k-sectionhead{ display:flex; justify-content:space-between; align-items:baseline; margin:26px 2px 12px; }
  .k-sectionhead__t{ font:500 16px/1 var(--sans); margin:0; color:var(--ink); }
  .k-sectionhead__a{ border:0; background:none; color:var(--evergreen); font:500 13px var(--sans); cursor:pointer; }

  .k-btn{ display:inline-flex; align-items:center; justify-content:center; gap:8px;
    font:500 15px var(--sans); border-radius:14px; padding:14px 20px; cursor:pointer;
    border:0.5px solid transparent; transition:background .15s,color .15s; }
  .k-btn--full{ width:100%; }
  .k-btn--primary{ background:var(--evergreen); color:#F2EEE4; }
  .k-btn--primary:active{ background:var(--evergreen-deep); }
  .k-btn--light{ background:var(--white); color:var(--ink); border-color:var(--line); }
  .k-btn--ghost{ background:transparent; color:var(--evergreen); padding:10px 12px; }

  .k-chip{ display:inline-flex; align-items:center; gap:6px; padding:9px 14px; border-radius:999px;
    border:0.5px solid var(--line); background:var(--white); color:var(--ink-soft);
    font:500 13.5px var(--sans); white-space:nowrap; cursor:pointer; }
  .k-chip--on{ background:var(--evergreen); color:var(--cream); border-color:transparent; }

  .k-card{ background:var(--white); border:0.5px solid var(--line); border-radius:var(--r); padding:16px; }
  .k-card--tap{ cursor:pointer; transition:transform .12s; }
  .k-card--tap:active{ transform:scale(.992); }
  .k-card--tint-sand{ background:var(--sand); border-color:transparent; }
  .k-card--tint-clay{ background:var(--clay); border-color:transparent; }
  .k-card--tint-sage{ background:var(--sage-soft); border-color:transparent; }
  .k-stack{ display:flex; flex-direction:column; gap:10px; }

  .k-iconbadge{ display:grid; place-items:center; border-radius:13px; flex:none; color:var(--ink); }
  .k-iconbadge--sand{ background:rgba(255,255,255,.66); }
  .k-iconbadge--clay{ background:rgba(255,255,255,.6); }
  .k-iconbadge--sage{ background:rgba(255,255,255,.6); }

  .k-toggle{ width:46px; height:28px; border-radius:999px; background:var(--line); border:0; position:relative; cursor:pointer; transition:background .18s; flex:none; }
  .k-toggle--on{ background:var(--evergreen); }
  .k-toggle__knob{ position:absolute; top:3px; left:3px; width:22px; height:22px; border-radius:50%; background:var(--white); transition:left .18s; }
  .k-toggle--on .k-toggle__knob{ left:21px; }

  .k-check{ width:24px; height:24px; border-radius:8px; border:1.4px solid var(--line); background:var(--white);
    display:grid; place-items:center; color:#fff; cursor:pointer; flex:none; transition:.15s; }
  .k-check--on{ background:var(--evergreen); border-color:var(--evergreen); }

  .k-progress{ height:6px; border-radius:999px; background:var(--line-soft); overflow:hidden; }
  .k-progress__fill{ display:block; height:100%; background:var(--sage); border-radius:999px; transition:width .3s; }

  .k-stars{ display:inline-flex; align-items:center; gap:4px; font:500 13px var(--sans); color:var(--ink); }
  .k-stars__r{ color:var(--ink-faint); font-weight:400; }

  .k-avatar{ display:grid; place-items:center; border-radius:50%; font-family:var(--serif); font-weight:500; flex:none; }
  .k-avatar--sage{ background:var(--sage-soft); color:var(--evergreen); }
  .k-avatar--ever{ background:var(--evergreen); color:#EFEBE0; }

  .k-field{ display:block; margin-bottom:14px; }
  .k-field__l{ display:block; font:500 13px var(--sans); color:var(--ink-soft); margin-bottom:7px; }
  .k-input{ width:100%; font:400 15.5px var(--sans); color:var(--ink); background:var(--white);
    border:0.5px solid var(--line); border-radius:13px; padding:14px 15px; outline:none; }
  .k-input:focus{ border-color:var(--sage); }
  .k-selectwrap{ position:relative; }
  select.k-input{ appearance:none; -webkit-appearance:none; }

  .k-pill{ display:inline-flex; align-items:center; font:500 11.5px var(--sans); letter-spacing:.01em;
    padding:5px 10px; border-radius:999px; }
  .k-pill--sage{ background:var(--sage-soft); color:var(--evergreen); }
  .k-pill--clay{ background:var(--clay); color:#9C4F33; }
  .k-pill--ever{ background:var(--evergreen); color:#EAE7DC; }
  .k-pill--muted{ background:var(--line-soft); color:var(--ink-soft); }
  .k-pill--faint{ background:transparent; color:var(--ink-faint); border:0.5px solid var(--line); }

  .k-tag{ font:500 11.5px var(--sans); padding:3px 9px; border-radius:7px; }
  .k-tag--sand{ background:var(--sand); color:#8a6a4d; }
  .k-tag--sage{ background:var(--sage-soft); color:var(--evergreen); }

  /* ---------- top bar / nav ---------- */
  .k-topbar{ position:sticky; top:0; z-index:5; display:flex; align-items:center; gap:8px;
    padding:14px 18px 12px; background:var(--cream); }
  .k-topbar__back{ width:40px; height:40px; border-radius:12px; border:0.5px solid var(--line);
    background:var(--white); display:grid; place-items:center; cursor:pointer; color:var(--ink); flex:none; }
  .k-topbar__center{ flex:1; text-align:center; }
  .k-topbar__t{ font:500 15px var(--sans); }
  .k-topbar__sub{ font:400 12px var(--sans); color:var(--ink-faint); }
  .k-topbar__sp{ width:40px; flex:none; }

  .k-nav{ flex:none; display:flex; background:var(--white); border-top:0.5px solid var(--line);
    padding:9px 6px calc(9px + env(safe-area-inset-bottom)); }
  .k-nav__i{ flex:1; display:flex; flex-direction:column; align-items:center; gap:4px; padding:6px 0;
    border:0; background:none; cursor:pointer; color:var(--ink-faint); font:500 11px var(--sans); }
  .k-nav__i--on{ color:var(--evergreen); }

  /* ---------- auth ---------- */
  .k-auth{ min-height:100%; display:flex; flex-direction:column; padding:0 26px 30px; }
  .k-auth__top{ padding-top:max(64px,12vh); }
  .k-logo{ display:inline-flex; align-items:center; gap:11px; }
  .k-logo__mark{ display:grid; place-items:center; width:1.55em; height:1.55em; border-radius:.42em;
    background:var(--evergreen); color:#EFEBE0; }
  .k-logo__word{ font-family:var(--serif); font-weight:500; letter-spacing:-.015em; color:var(--ink); }
  .k-auth__tag{ font:400 16px/1.5 var(--sans); color:var(--ink-soft); margin:20px 0 0; max-width:21em; }
  .k-auth__form{ margin-top:auto; padding-top:40px; }
  .k-auth__forgot{ border:0; background:none; color:var(--ink-soft); font:500 13px var(--sans); cursor:pointer; margin:-4px 0 18px; padding:0; }
  .k-auth__or{ text-align:center; position:relative; margin:18px 0; }
  .k-auth__or::before{ content:""; position:absolute; left:0; right:0; top:50%; height:0.5px; background:var(--line); }
  .k-auth__or span{ position:relative; background:var(--cream); padding:0 14px; font:400 13px var(--sans); color:var(--ink-faint); }
  .k-auth__form .k-btn--light{ margin-bottom:10px; }
  .k-auth__switch{ border:0; background:none; cursor:pointer; text-align:center; margin-top:22px;
    font:400 14px var(--sans); color:var(--ink-soft); }
  .k-auth__switch strong{ color:var(--evergreen); font-weight:500; }

  /* ---------- onboarding ---------- */
  .k-ob{ min-height:100%; display:flex; flex-direction:column; }
  .k-ob__head{ position:sticky; top:0; z-index:5; display:flex; align-items:center; gap:14px;
    padding:14px 18px 10px; background:var(--cream); }
  .k-ob__progress{ flex:1; }
  .k-ob__count{ font:500 13px var(--mono); color:var(--ink-faint); min-width:34px; text-align:right; }
  .k-ob__scroll{ flex:1; padding:18px 24px 24px; }
  .k-ob__title{ font:500 28px/1.12 var(--serif); margin:0 0 8px; letter-spacing:-.015em; }
  .k-ob__hint{ font:400 15px/1.5 var(--sans); color:var(--ink-soft); margin:0 0 24px; }
  .k-ob__opts{ display:flex; flex-direction:column; gap:10px; margin-bottom:18px; }
  .k-opt{ display:flex; align-items:center; gap:13px; text-align:left; width:100%; cursor:pointer;
    background:var(--white); border:0.5px solid var(--line); border-radius:var(--r); padding:16px; transition:.15s; }
  .k-opt--on{ border-color:var(--evergreen); background:#FCFBF7; }
  .k-opt__ic{ width:40px; height:40px; border-radius:11px; background:var(--sand); display:grid; place-items:center; color:var(--ink); flex:none; }
  .k-opt--on .k-opt__ic{ background:var(--sage-soft); color:var(--evergreen); }
  .k-opt__body{ flex:1; display:flex; flex-direction:column; gap:2px; }
  .k-opt__t{ font:500 15.5px var(--sans); }
  .k-opt__n{ font:400 13px var(--sans); color:var(--ink-soft); }
  .k-opt__tick{ width:22px; height:22px; border-radius:50%; border:1.4px solid var(--line); display:grid; place-items:center; color:#fff; flex:none; }
  .k-opt--on .k-opt__tick{ background:var(--evergreen); border-color:var(--evergreen); }
  .k-ob__foot{ position:sticky; bottom:0; padding:14px 24px calc(18px + env(safe-area-inset-bottom));
    background:linear-gradient(transparent,var(--cream) 26%); }
  .k-ob__done{ text-align:center; padding-top:28px; }
  .k-ob__doneicon{ width:64px; height:64px; border-radius:20px; background:var(--sage-soft); color:var(--evergreen);
    display:grid; place-items:center; margin:0 auto 20px; }
  .k-ob__done .k-ob__hint{ max-width:25em; margin-left:auto; margin-right:auto; }
  .k-ob__sum{ background:var(--white); border:0.5px solid var(--line); border-radius:var(--r); padding:6px 16px; text-align:left; margin-top:6px; }
  .k-ob__sumrow{ display:flex; justify-content:space-between; align-items:center; padding:13px 0; border-bottom:0.5px solid var(--line-soft); }
  .k-ob__sumrow:last-child{ border-bottom:0; }
  .k-ob__sumk{ font:400 14px var(--sans); color:var(--ink-soft); }
  .k-ob__sumv{ font:500 14px var(--sans); }
  .k-ob__sumrow--hi .k-ob__sumv{ font-family:var(--serif); font-size:18px; color:var(--evergreen); }

  /* ---------- page head ---------- */
  .k-pagehead{ display:flex; justify-content:space-between; align-items:flex-start; padding:26px 2px 8px; }
  .k-pagehead__hi{ font:500 16px var(--sans); }
  .k-pagehead__date{ font:400 13px var(--sans); color:var(--ink-faint); margin-top:2px; }
  .k-iconbtn{ width:42px; height:42px; border-radius:13px; border:0.5px solid var(--line); background:var(--white);
    display:grid; place-items:center; cursor:pointer; color:var(--ink); position:relative; }
  .k-iconbtn__dot{ position:absolute; top:11px; right:12px; width:7px; height:7px; border-radius:50%; background:var(--terracotta); }

  /* ---------- TRASA ---------- */
  .k-trasa__lead{ padding:8px 2px 4px; }
  .k-trasa__big{ font:500 35px/1.04 var(--serif); margin:6px 0 6px; letter-spacing:-.02em; }
  .k-trasa__sub{ font:400 15px/1.45 var(--sans); color:var(--ink-soft); margin:0 0 16px; max-width:24em; }
  .k-phases{ display:flex; gap:4px; margin:0 0 22px; }
  .k-phases__seg{ flex:1; height:4px; border-radius:999px; background:var(--line); }
  .k-phases__seg--done{ background:var(--sage); }
  .k-phases__seg--on{ background:var(--evergreen); }

  .k-hero{ background:var(--evergreen); color:#EBE8DE; border-radius:var(--r-lg); padding:22px; cursor:pointer; transition:transform .12s; }
  .k-hero:active{ transform:scale(.992); }
  .k-hero__row{ display:flex; align-items:center; justify-content:space-between; margin-bottom:14px; }
  .k-hero__kick{ font:500 11.5px var(--sans); letter-spacing:.05em; color:#A9BBA8; text-transform:lowercase; }
  .k-hero__clock{ display:inline-flex; align-items:center; gap:5px; font:500 11.5px var(--sans);
    color:#F0D3C5; background:rgba(189,106,78,.28); padding:5px 10px; border-radius:999px; }
  .k-hero__t{ font:500 23px/1.18 var(--serif); margin:0 0 8px; color:#F4F1E9; letter-spacing:-.01em; }
  .k-hero__note{ font:400 14px/1.5 var(--sans); color:#BFCABB; margin:0 0 18px; }
  .k-hero__cta{ display:inline-flex; align-items:center; gap:8px; font:500 14px var(--sans); color:#F4F1E9;
    background:rgba(255,255,255,.1); padding:11px 16px; border-radius:12px; }

  .k-task{ display:flex; align-items:center; gap:14px; }
  .k-task__body{ flex:1; min-width:0; }
  .k-task__t{ font:500 15px var(--sans); margin-bottom:3px; }
  .k-task__n{ font:400 13px/1.4 var(--sans); color:var(--ink-soft); }

  .k-money{ margin-top:12px; background:var(--white); border:0.5px solid var(--line); border-radius:var(--r-lg);
    padding:20px 22px; cursor:pointer; }
  .k-money__top{ display:flex; justify-content:space-between; align-items:center; }
  .k-money__num{ font:500 44px/1 var(--serif); margin:10px 0 4px; letter-spacing:-.02em; }
  .k-money__cap{ font:400 14px var(--sans); color:var(--ink-soft); }
  .k-money__link{ display:inline-flex; align-items:center; gap:7px; margin-top:16px; font:500 14px var(--sans); color:var(--evergreen); }

  /* ---------- SZKOŁY ---------- */
  .k-searchbar{ display:flex; align-items:center; gap:10px; background:var(--white); border:0.5px solid var(--line);
    border-radius:14px; padding:0 15px; margin:14px 0 14px; }
  .k-searchinput{ flex:1; border:0; background:none; outline:none; font:400 15px var(--sans); color:var(--ink); padding:14px 0; }
  .k-searchinput::placeholder{ color:var(--ink-faint); }
  .k-chiprow{ display:flex; gap:8px; overflow-x:auto; padding:0 2px 4px; margin:0 -18px 6px; padding-left:18px; padding-right:18px; }
  .k-chiprow::-webkit-scrollbar{ display:none; }
  .k-szkoly__list{ margin-top:8px; }
  .k-empty{ text-align:center; color:var(--ink-faint); font:400 14px var(--sans); padding:40px 0; }

  .k-school{ padding:0; overflow:hidden; }
  .k-school__main{ padding:16px; cursor:pointer; }
  .k-school__head{ display:flex; justify-content:space-between; gap:12px; align-items:flex-start; }
  .k-school__name{ font:500 16.5px/1.25 var(--serif); margin-bottom:7px; letter-spacing:-.01em; }
  .k-school__meta{ display:flex; align-items:center; gap:8px; flex-wrap:wrap; }
  .k-school__area{ display:inline-flex; align-items:center; gap:4px; font:400 12.5px var(--sans); color:var(--ink-soft); }
  .k-school__price{ font:500 14px var(--mono); color:var(--ink); white-space:nowrap; text-align:right; }
  .k-school__price--free{ color:var(--evergreen); }
  .k-school__foot{ display:flex; justify-content:space-between; align-items:center; margin-top:14px; padding-top:13px; border-top:0.5px solid var(--line-soft); }
  .k-school__sched{ font:400 12.5px var(--sans); color:var(--ink-faint); }
  .k-cmp{ width:100%; display:flex; align-items:center; gap:9px; padding:13px 16px; border:0; border-top:0.5px solid var(--line);
    background:#FCFBF7; cursor:pointer; font:500 13px var(--sans); color:var(--ink-soft); }
  .k-cmp--on{ color:var(--evergreen); background:var(--sage-soft); }
  .k-cmpbar{ position:sticky; bottom:0; padding:14px 0 calc(16px + env(safe-area-inset-bottom));
    margin-top:6px; background:linear-gradient(transparent,var(--cream) 30%); }

  /* ---------- PIENIĄDZE ---------- */
  .k-bignum{ background:var(--evergreen); color:#EBE8DE; border-radius:var(--r-lg); padding:24px 22px; margin:14px 0 8px; }
  .k-bignum .k-kicker{ color:#A9BBA8; }
  .k-bignum__v{ font:500 56px/1 var(--serif); margin:10px 0 8px; color:#F4F1E9; letter-spacing:-.02em; }
  .k-bignum__basis{ font:400 13px/1.5 var(--sans); color:#BFCABB; margin:0 0 18px; }
  .k-bignum__actions{ display:flex; gap:10px; }
  .k-bignum__actions .k-btn{ flex:1; padding:12px; font-size:13.5px; }

  .k-benefit{ cursor:pointer; }
  .k-benefit__top{ display:flex; justify-content:space-between; align-items:center; gap:10px; }
  .k-benefit__name{ font:500 16.5px var(--serif); letter-spacing:-.01em; }
  .k-benefit__amt{ display:flex; align-items:baseline; gap:7px; margin:11px 0 12px; }
  .k-benefit__num{ font:500 21px var(--mono); color:var(--ink); letter-spacing:-.02em; }
  .k-benefit__unit{ font:400 13px var(--sans); color:var(--ink-soft); }
  .k-benefit__meta{ display:flex; gap:16px; flex-wrap:wrap; padding-top:12px; border-top:0.5px solid var(--line-soft); }
  .k-benefit__meta span{ display:inline-flex; align-items:center; gap:5px; font:400 12.5px var(--sans); color:var(--ink-soft); }

  /* ---------- LISTA ---------- */
  .k-cl{ padding:16px 16px 18px; }
  .k-cl--muted{ opacity:.7; }
  .k-cl__head{ display:flex; justify-content:space-between; align-items:center; gap:12px; width:100%;
    border:0; background:none; cursor:pointer; padding:0; text-align:left; margin-bottom:14px; }
  .k-cl__t{ font:500 16px var(--sans); margin-bottom:3px; }
  .k-cl__n{ font:400 13px var(--sans); color:var(--ink-soft); }
  .k-cl__right{ display:flex; align-items:center; gap:9px; flex:none; }
  .k-cl__count{ font:500 13px var(--mono); color:var(--ink-faint); }
  .k-cl__items{ display:flex; flex-direction:column; gap:2px; margin-top:14px; }
  .k-cli{ display:flex; align-items:center; gap:12px; width:100%; border:0; background:none; cursor:pointer;
    padding:9px 0; text-align:left; font:400 14.5px/1.35 var(--sans); color:var(--ink); }
  .k-cli--done span{ color:var(--ink-faint); text-decoration:line-through; }
  .k-lista__done{ margin-top:8px; }

  /* ---------- PROFIL ---------- */
  .k-pcard{ display:flex; align-items:center; gap:14px; background:var(--white); border:0.5px solid var(--line);
    border-radius:var(--r); padding:16px; margin-bottom:10px; }
  .k-pcard--me{ margin:14px 0 10px; }
  .k-pcard__txt{ flex:1; min-width:0; }
  .k-pcard__name{ font:500 17px var(--serif); }
  .k-pcard__sub{ font:400 13px var(--sans); color:var(--ink-soft); margin-top:2px; }
  .k-pcard__pesel{ font:400 12px var(--mono); color:var(--ink-faint); margin-top:4px; }
  .k-pcard__edit{ border:0.5px solid var(--line); background:var(--white); color:var(--ink-soft);
    font:500 13px var(--sans); padding:8px 14px; border-radius:999px; cursor:pointer; flex:none; }
  .k-group{ background:var(--white); border:0.5px solid var(--line); border-radius:var(--r); overflow:hidden; }
  .k-prow{ display:flex; align-items:center; gap:12px; width:100%; border:0; background:var(--white);
    cursor:pointer; padding:15px 16px; text-align:left; border-bottom:0.5px solid var(--line-soft); }
  .k-group .k-prow:last-child{ border-bottom:0; }
  .k-prow:not(.k-group .k-prow){ border:0.5px solid var(--line); border-radius:var(--r); margin-bottom:10px; }
  .k-prow--toggle{ cursor:default; }
  .k-prow__ic{ width:34px; height:34px; border-radius:10px; background:var(--cream); display:grid; place-items:center; color:var(--ink-soft); flex:none; }
  .k-prow__l{ flex:1; font:500 14.5px var(--sans); }
  .k-prow__v{ font:400 14px var(--sans); color:var(--ink-soft); }
  .k-logout{ width:100%; border:0.5px solid var(--line); background:var(--white); color:var(--terracotta);
    font:500 15px var(--sans); padding:15px; border-radius:14px; cursor:pointer; margin-top:24px; }
  .k-version{ text-align:center; font:400 12px var(--mono); color:var(--ink-faint); margin-top:16px; }

  /* ---------- DETAL ---------- */
  .k-detail{ min-height:100%; display:flex; flex-direction:column; }
  .k-detail__scroll{ flex:1; padding:4px 22px 24px; }
  .k-detail__scroll .k-pill{ margin-bottom:14px; }
  .k-detail__title{ font:500 26px/1.16 var(--serif); margin:0 0 10px; letter-spacing:-.015em; text-wrap:pretty; }
  .k-detail__lead{ font:400 15.5px/1.55 var(--sans); color:var(--ink-soft); margin:0 0 20px; }
  .k-detail__amtbox{ display:flex; align-items:baseline; gap:10px; background:var(--sage-soft); border-radius:var(--r);
    padding:18px 20px; margin-bottom:18px; }
  .k-detail__amt{ font:500 30px var(--serif); color:var(--evergreen); letter-spacing:-.02em; white-space:nowrap; }
  .k-detail__amtunit{ font:400 14px var(--sans); color:var(--evergreen); opacity:.8; }
  .k-infogrid{ display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-bottom:6px; }
  .k-infocell{ display:flex; gap:10px; background:var(--white); border:0.5px solid var(--line); border-radius:14px; padding:14px; }
  .k-infocell__ic{ color:var(--terracotta); flex:none; margin-top:1px; }
  .k-infocell__k{ font:400 12px var(--sans); color:var(--ink-faint); margin-bottom:3px; }
  .k-infocell__v{ font:500 13.5px/1.3 var(--sans); color:var(--ink); }
  .k-block{ margin-top:24px; }
  .k-block__t{ font:500 16px var(--sans); margin:0 0 12px; }
  .k-detail__p{ font:400 15px/1.6 var(--sans); color:var(--ink-soft); margin:0; }
  .k-steps{ list-style:none; margin:0; padding:0; display:flex; flex-direction:column; gap:14px; }
  .k-steps__i{ display:flex; gap:13px; font:400 14.5px/1.5 var(--sans); color:var(--ink); }
  .k-steps__n{ width:26px; height:26px; border-radius:50%; background:var(--sand); color:var(--ink);
    font:500 13px var(--mono); display:grid; place-items:center; flex:none; }
  .k-doclist{ list-style:none; margin:0; padding:0; display:flex; flex-direction:column; gap:11px; }
  .k-doclist li{ display:flex; align-items:center; gap:11px; font:400 14.5px var(--sans); color:var(--ink); }
  .k-detail__foot{ position:sticky; bottom:0; padding:14px 22px calc(18px + env(safe-area-inset-bottom));
    background:linear-gradient(transparent,var(--cream) 26%); }
  .k-detail__foot--2{ display:grid; grid-template-columns:auto 1fr; gap:10px; }

  .k-shero{ height:150px; border-radius:var(--r); display:grid; place-items:center; margin-bottom:18px; color:var(--evergreen); }
  .k-shero--sand{ background:var(--sand); }
  .k-shero--sage{ background:var(--sage-soft); }
  .k-detail__srow{ display:flex; align-items:center; gap:14px; flex-wrap:wrap; margin-bottom:16px; }

  .k-compare{ display:grid; gap:0; border:0.5px solid var(--line); border-radius:var(--r); overflow:hidden; background:var(--white); }
  .k-compare__corner{ background:var(--cream); }
  .k-compare__h{ padding:14px 12px; background:var(--cream); border-left:0.5px solid var(--line); }
  .k-compare__hname{ font:500 14px/1.2 var(--serif); margin-bottom:6px; }
  .k-compare__rk{ padding:13px 12px; font:400 12.5px var(--sans); color:var(--ink-faint); border-top:0.5px solid var(--line-soft); display:flex; align-items:center; }
  .k-compare__rv{ padding:13px 12px; font:500 13px var(--sans); color:var(--ink); border-top:0.5px solid var(--line-soft); border-left:0.5px solid var(--line-soft); display:flex; align-items:center; }

  /* image-slot tuning */
  image-slot{ border-radius:50%; }

  /* ===================== TŁO LOGOWANIA ===================== */
  .k-auth{ position:relative; }
  .k-auth__art{ position:absolute; right:-46px; top:46px; width:300px; height:auto; z-index:0;
    color:var(--evergreen); opacity:.92; pointer-events:none; }
  .k-auth__art svg{ width:100%; height:auto; display:block; }
  .k-art__sun{ fill:var(--clay); opacity:.45; }
  .k-auth__top,.k-auth__form,.k-auth__switch{ position:relative; z-index:1; }
  .k-auth__form{ background:linear-gradient(180deg, rgba(250,247,242,0) 0%, var(--cream) 16%); }

  /* ===================== TOOLSTRIP NA TRASIE ===================== */
  .k-toolstrip{ display:flex; gap:8px; margin:18px 0 4px; overflow-x:auto; padding-bottom:2px; }
  .k-toolstrip::-webkit-scrollbar{ display:none; }
  .k-toolstrip__i{ flex:1 0 auto; min-width:64px; display:flex; flex-direction:column; align-items:center; gap:7px;
    border:0; background:none; cursor:pointer; }
  .k-toolstrip__ic{ width:54px; height:54px; border-radius:16px; background:var(--white); border:0.5px solid var(--line);
    display:grid; place-items:center; color:var(--evergreen); }
  .k-toolstrip__i:active .k-toolstrip__ic{ background:var(--sage-soft); }
  .k-toolstrip__t{ font:500 11.5px var(--sans); color:var(--ink-soft); }

  /* ===================== HUB NARZĘDZIA ===================== */
  .k-tools__intro{ padding:6px 2px 4px; }
  .k-tools__h1{ font:500 27px/1.05 var(--serif); margin:0 0 8px; letter-spacing:-.01em; }
  .k-tools__lead{ font:400 15px/1.5 var(--sans); color:var(--ink-soft); margin:0; max-width:26em; }
  .k-tools__sec{ margin-top:24px; }
  .k-tools__seclabel{ font:500 13px var(--sans); color:var(--ink-faint); letter-spacing:.03em; margin:0 2px 12px; }
  .k-tools__grid{ display:grid; grid-template-columns:1fr 1fr; gap:10px; }
  .k-toolcard{ display:flex; flex-direction:column; align-items:flex-start; gap:10px; text-align:left;
    background:var(--white); border:0.5px solid var(--line); border-radius:var(--r); padding:16px; cursor:pointer; transition:transform .12s; }
  .k-toolcard:active{ transform:scale(.98); }
  .k-toolcard__t{ font:500 15px var(--sans); }
  .k-toolcard__n{ font:400 12.5px/1.4 var(--sans); color:var(--ink-soft); }

  /* ===================== TYDZIEŃ CIĄŻY ===================== */
  .k-week__picker{ display:flex; gap:7px; overflow-x:auto; padding:6px 18px 10px; }
  .k-week__picker::-webkit-scrollbar{ display:none; }
  .k-week__pill{ flex:none; width:44px; height:44px; border-radius:13px; border:0.5px solid var(--line);
    background:var(--white); color:var(--ink-soft); font:500 15px var(--mono); cursor:pointer; }
  .k-week__pill--on{ background:var(--evergreen); color:var(--cream); border-color:transparent; }
  .k-week__hero{ display:flex; align-items:center; justify-content:space-between; background:var(--sage-soft);
    border-radius:var(--r-lg); padding:22px 24px; margin-bottom:16px; }
  .k-week__herotxt{ display:flex; flex-direction:column; gap:5px; min-width:0; }
  .k-week__fruit{ font:500 26px/1.12 var(--serif); color:var(--evergreen); letter-spacing:-.01em; text-wrap:balance; }
  .k-week__size{ font:500 14px var(--mono); color:var(--evergreen); opacity:.8; }
  .k-week__fruiticon{ color:var(--evergreen); opacity:.55; flex:none; margin-left:14px; }
  .k-wblock{ display:flex; gap:13px; align-items:flex-start; padding:15px 0; border-bottom:0.5px solid var(--line-soft); }
  .k-wblock__t{ font:500 15px var(--sans); margin-bottom:4px; }
  .k-wblock__b{ font:400 14px/1.55 var(--sans); color:var(--ink-soft); }
  .k-week__tip{ display:flex; gap:12px; align-items:flex-start; background:var(--clay); border-radius:var(--r);
    padding:16px; margin-top:16px; }
  .k-week__tipl{ font:500 13px var(--sans); color:#9C4F33; margin-bottom:3px; }
  .k-week__tipb{ font:400 14px/1.5 var(--sans); color:var(--ink); }

  /* ===================== KALKULATOR TERMINU ===================== */
  .k-input[type=date]{ font-family:var(--sans); }
  .k-due{ background:var(--evergreen); color:#EBE8DE; border-radius:var(--r-lg); padding:22px; margin:6px 0 14px; }
  .k-due__main .k-kicker{ color:#A9BBA8; }
  .k-due__date{ font:500 28px/1.1 var(--serif); color:#F4F1E9; margin-top:8px; letter-spacing:-.01em; }
  .k-due__stats{ display:flex; gap:10px; margin-top:20px; }
  .k-due__stat{ flex:1; background:rgba(255,255,255,.09); border-radius:13px; padding:13px 12px; text-align:center; }
  .k-due__statv{ font:500 19px var(--serif); color:#F4F1E9; }
  .k-due__statl{ font:400 11px var(--sans); color:#A9BBA8; margin-top:3px; }
  .k-due__note{ display:flex; gap:10px; align-items:flex-start; font:400 12.5px/1.5 var(--sans); color:var(--ink-soft); padding:4px 2px; }
  /* w detalu kalkulatora odstępy stat różne — reuse DueStat */
  .k-contr__stats,.k-vac__head{ }
  .k-detail .k-due__stat .k-due__statv{ white-space:nowrap; }

  /* ===================== LICZNIK KOPNIĘĆ ===================== */
  .k-kick__hint{ text-align:center; font:400 14px var(--sans); color:var(--ink-soft); margin:4px 0 22px; }
  .k-kick__dial{ width:210px; height:210px; border-radius:50%; margin:0 auto; display:flex; flex-direction:column;
    align-items:center; justify-content:center; gap:4px; cursor:pointer; border:1px solid var(--sage);
    background:var(--white); color:var(--ink); transition:transform .08s, background .2s, border-color .2s; }
  .k-kick__dial:active{ transform:scale(.96); }
  .k-kick__dial--live{ border-color:var(--evergreen); background:#FCFBF7; }
  .k-kick__dial--done{ background:var(--sage-soft); border-color:var(--evergreen); }
  .k-kick__num{ font:500 64px/1 var(--serif); color:var(--evergreen); letter-spacing:-.02em; }
  .k-kick__of{ font:400 13px var(--sans); color:var(--ink-soft); }
  .k-kick__time{ display:inline-flex; align-items:center; gap:5px; font:500 12px var(--mono); color:var(--ink-faint); margin-top:6px; }
  .k-kick__actions{ display:flex; gap:10px; justify-content:center; margin-top:24px; }
  .k-kick__actions .k-btn{ flex:1; max-width:150px; }
  .k-histrow{ display:flex; align-items:center; gap:13px; background:var(--white); border:0.5px solid var(--line);
    border-radius:var(--r); padding:14px 16px; }
  .k-histrow__ic{ width:38px; height:38px; border-radius:11px; background:var(--sand); display:grid; place-items:center; color:var(--ink); flex:none; }
  .k-histrow__txt{ flex:1; }
  .k-histrow__t{ font:500 14px var(--sans); }
  .k-histrow__d{ font:400 12.5px var(--sans); color:var(--ink-soft); margin-top:2px; }
  .k-histrow__v{ font:500 13px var(--mono); color:var(--ink-soft); }

  /* ===================== TIMER SKURCZÓW ===================== */
  .k-contr__stats{ display:flex; gap:10px; margin:4px 0 20px; }
  .k-contr__stats .k-due__stat{ background:var(--white); border:0.5px solid var(--line); }
  .k-contr__stats .k-due__statv{ color:var(--ink); }
  .k-contr__stats .k-due__statl{ color:var(--ink-faint); }
  .k-contr__btn{ width:100%; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:6px; cursor:pointer;
    background:var(--evergreen); color:#F2EEE4; border:0; border-radius:var(--r-lg); padding:26px; text-align:center; }
  .k-contr__btn--live{ background:var(--terracotta); }
  .k-contr__btn span:nth-child(2){ font:500 23px/1.1 var(--serif); white-space:nowrap; }
  .k-contr__btnsub{ font:400 12.5px/1.2 var(--sans); opacity:.85; }
  .k-contr__alert{ display:flex; gap:11px; align-items:flex-start; background:var(--clay); border-radius:var(--r);
    padding:15px; margin-top:16px; font:400 13.5px/1.5 var(--sans); color:var(--ink); }
  .k-contr__alert svg{ color:var(--terracotta); margin-top:1px; }
  .k-contr__log{ background:var(--white); border:0.5px solid var(--line); border-radius:var(--r); overflow:hidden; }
  .k-contr__loghead,.k-contr__logrow{ display:grid; grid-template-columns:1fr 1fr 1fr; padding:12px 16px; }
  .k-contr__loghead{ font:500 11.5px var(--sans); color:var(--ink-faint); letter-spacing:.02em; background:#FCFBF7; border-bottom:0.5px solid var(--line); }
  .k-contr__logrow{ font:500 14px var(--mono); color:var(--ink); border-bottom:0.5px solid var(--line-soft); }
  .k-contr__logrow:last-child{ border-bottom:0; }
  .k-contr__lt{ color:var(--ink-soft); }
  .k-contr__lg{ color:var(--evergreen); }

  /* ===================== DZIENNIK BADAŃ ===================== */
  .k-tj__summary{ display:flex; align-items:center; background:var(--white); border:0.5px solid var(--line);
    border-radius:var(--r); padding:16px; }
  .k-tj__sumitem{ flex:1; text-align:center; }
  .k-tj__sumv{ font:500 24px var(--serif); color:var(--ink); }
  .k-tj__sumv--ok{ color:var(--evergreen); }
  .k-tj__sumv--out{ color:var(--terracotta); }
  .k-tj__suml{ font:400 11.5px var(--sans); color:var(--ink-soft); margin-top:2px; }
  .k-tj__sumdiv{ width:0.5px; align-self:stretch; background:var(--line); margin:4px 0; }
  .k-tj{ background:var(--white); border:0.5px solid var(--line); border-radius:var(--r); padding:16px; }
  .k-tj__top{ display:flex; justify-content:space-between; align-items:center; gap:10px; margin-bottom:12px; }
  .k-tj__name{ font:500 14.5px var(--sans); }
  .k-tj__row{ display:flex; justify-content:space-between; align-items:baseline; padding-top:12px; border-top:0.5px solid var(--line-soft); }
  .k-tj__val{ font:500 22px var(--mono); color:var(--ink); letter-spacing:-.02em; }
  .k-tj__unit{ font:400 12px var(--sans); color:var(--ink-soft); margin-left:5px; }
  .k-tj__range{ font:400 12.5px var(--sans); color:var(--ink-faint); }
  .k-tj__date{ display:inline-flex; align-items:center; gap:5px; font:400 11.5px var(--sans); color:var(--ink-faint); margin-top:10px; }

  /* ===================== KARMIENIE ===================== */
  .k-feed__last{ background:var(--sand); border-radius:var(--r); padding:16px 18px; margin-bottom:14px; }
  .k-feed__lastv{ font:500 17px var(--serif); margin-top:5px; }
  .k-feed__sides{ display:grid; grid-template-columns:1fr 1fr; gap:12px; }
  .k-feed__side{ position:relative; background:var(--white); border:1px solid var(--line); border-radius:var(--r-lg);
    padding:26px 16px; cursor:pointer; text-align:center; transition:.18s; overflow:hidden; }
  .k-feed__side--on{ border-color:var(--evergreen); background:var(--sage-soft); }
  .k-feed__sidel{ font:500 17px var(--serif); }
  .k-feed__sidet{ font:500 15px var(--mono); color:var(--ink-soft); margin-top:6px; }
  .k-feed__side--on .k-feed__sidet{ color:var(--evergreen); }
  .k-feed__pulse{ position:absolute; top:12px; right:12px; width:9px; height:9px; border-radius:50%;
    background:var(--terracotta); animation:kpulse 1.1s ease-in-out infinite; }
  @keyframes kpulse{ 0%,100%{ opacity:1; } 50%{ opacity:.25; } }
  .k-feed__tip{ text-align:center; font:400 13px var(--sans); color:var(--ink-soft); margin:14px 0 0; }
  .k-feed__badge{ width:38px; height:38px; border-radius:11px; display:grid; place-items:center; flex:none;
    font:500 15px var(--serif); color:#fff; }
  .k-feed__badge--l{ background:var(--evergreen); }
  .k-feed__badge--r{ background:var(--sage); }

  /* ===================== SZCZEPIENIA ===================== */
  .k-vac__head{ display:flex; justify-content:space-between; align-items:center; background:var(--white);
    border:0.5px solid var(--line); border-radius:var(--r); padding:18px; margin-bottom:18px; }
  .k-vac__hv{ font:500 20px var(--serif); margin-top:5px; }
  .k-vac__ring{ width:56px; height:56px; border-radius:50%; flex:none; display:grid; place-items:center;
    background:conic-gradient(var(--evergreen) 17%, var(--line-soft) 0); }
  .k-vac__ringn{ width:42px; height:42px; border-radius:50%; background:var(--white); display:grid; place-items:center;
    font:500 12px var(--mono); color:var(--evergreen); }
  .k-vac__timeline{ position:relative; padding-left:6px; }
  .k-vac{ position:relative; display:flex; gap:16px; padding:0 0 22px 22px; }
  .k-vac::before{ content:""; position:absolute; left:5px; top:6px; bottom:-6px; width:1.5px; background:var(--line); }
  .k-vac:last-child::before{ display:none; }
  .k-vac__dot{ position:absolute; left:-1px; top:3px; width:14px; height:14px; border-radius:50%;
    background:var(--white); border:1.5px solid var(--line); display:grid; place-items:center; color:#fff; }
  .k-vac--done .k-vac__dot{ background:var(--evergreen); border-color:var(--evergreen); }
  .k-vac--next .k-vac__dot{ border-color:var(--terracotta); background:var(--clay); }
  .k-vac__body{ flex:1; padding-bottom:2px; }
  .k-vac__top{ display:flex; align-items:center; gap:9px; flex-wrap:wrap; }
  .k-vac__age{ font:500 15px var(--sans); }
  .k-vac__when{ font:400 12px var(--mono); color:var(--ink-faint); }
  .k-vac__date{ font:400 12.5px var(--sans); color:var(--ink-soft); margin-top:3px; }
  .k-vac__shots{ display:flex; flex-wrap:wrap; gap:6px; margin-top:10px; }
  .k-vac__shot{ font:400 12px var(--sans); color:var(--ink-soft); background:var(--sand); padding:5px 10px; border-radius:8px; }
  .k-vac--done .k-vac__shot{ background:var(--sage-soft); color:var(--evergreen); }

  /* ===================== ALBUM ===================== */
  .k-album{ display:grid; grid-template-columns:1fr 1fr; gap:12px; margin-top:16px; }
  .k-album__cell{ position:relative; }
  .k-album__cell image-slot{ border-radius:14px; }
  .k-album__tag{ position:absolute; left:10px; bottom:10px; font:500 11.5px var(--sans); color:#fff;
    background:rgba(43,38,32,.6); padding:4px 9px; border-radius:7px; backdrop-filter:blur(4px); pointer-events:none; }

  /* ===================== NOTATKI ===================== */
  .k-notes__add{ width:100%; display:flex; align-items:center; gap:10px; justify-content:center;
    border:1px dashed var(--line); background:var(--white); color:var(--ink-soft); border-radius:var(--r);
    padding:15px; cursor:pointer; font:500 14px var(--sans); }
  .k-note{ border-radius:var(--r); padding:16px; border:0.5px solid var(--line); }
  .k-note--clay{ background:var(--clay); border-color:transparent; }
  .k-note--sage{ background:var(--sage-soft); border-color:transparent; }
  .k-note--sand{ background:var(--sand); border-color:transparent; }
  .k-note__top{ display:flex; justify-content:space-between; align-items:center; margin-bottom:9px; }
  .k-note__kind{ font:500 11.5px var(--sans); letter-spacing:.02em; color:var(--ink-soft);
    background:rgba(255,255,255,.5); padding:4px 9px; border-radius:999px; }
  .k-note__date{ font:400 12px var(--sans); color:var(--ink-soft); }
  .k-note__title{ font:500 16px/1.25 var(--serif); margin-bottom:6px; letter-spacing:-.01em; }
  .k-note__body{ font:400 13.5px/1.55 var(--sans); color:var(--ink); opacity:.85; }
</style>
</head>
<body>
  <div id="root"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <script src="image-slot.js"></script>
  <script src="data.js"></script>
  <script src="data-tools.js"></script>
  <script src="icons.jsx"></script>
  <script src="ui.jsx"></script>
  <script src="auth.jsx"></script>
  <script src="main.jsx"></script>
  <script src="details.jsx"></script>
  <script src="tools.jsx"></script>
  <script src="tools2.jsx"></script>

  <script type="text/babel" src="tweaks-panel.jsx"></script>
  <script type="text/babel" src="app.jsx"></script>
</body>
</html>
